<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/contact">
        <h1>Feedback Form</h1>
        <label for="name">Name : </label>
        <input type="text" id="name" placeholder="Write Your Name: " >
        <br/><br/>
        <label for="email">Email : </label>
        <input type="text" id="email" placeholder="Write Your Email : ">
        <br/><br/>  
        <label for="Message">Message : </label>
        <br/>
        <textarea name="message" id="Message" rows="6" cols="30"></textarea>
        <br/><br/>
        <label for="rating">Rate us out of 5</label>
        <br/>
        <input type="radio" name="rating" id="one" value="one">
        <label for="one">1</label>
        <br/>
         <input type="radio" name="rating" id="Two" value="Two">
        <label for="Two">2</label>
        <br/>
         <input type="radio" name="rating" id="Three" value="Three">
        <label for="Three">3</label>
        <br/>
         <input type="radio" name="rating" id="Four" value="Four">
        <label for="Four">4</label>
        <br/>
        <input type="radio" name="rating" id="Five" value="Five">
        <label for="Fives ">5</label>
        <br/><br/>
        <button>Send your Message!</button>
    </form>
    
</body>
</html>
